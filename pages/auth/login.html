<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriMarKet</title>
    <link rel="stylesheet" href="../../assets/css/login.css">
</head>

<body>
    <div class="login-container">
        <!-- Left Section with Background Image -->
        <div class="image-section">
            <img src="../../assets/images/agrimarket_logo.png" alt="Agri Market Logo" class="logo">
            <div class="info">
                <p style="font-style: italic;">"AgriMarket: Bridging Farmers and Communities with Fresh, Local
                    Goodness!"</p>
            </div>
        </div>

        <!-- Right Section with Login Form -->
        <div class="form-section">
            <h2>Login to AgriMarket</h2>
            <form action="login.php" method="POST">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required><br><br>

                <label>
                    <input type="checkbox" id="show-password" onclick="togglePassword()"> Show Password
                </label><br><br>

                <button type="submit" name="submit">Login</button>
            </form>

            <p>Don't have an account? <a href="register.html">Register </a></p>
        </div>
    </div>

    <script>
        function togglePassword() {
            var passwordField = document.getElementById("password");
            var checkbox = document.getElementById("show-password");
            if (checkbox.checked) {
                passwordField.type = "text";  // Show the password
            } else {
                passwordField.type = "password";  // Hide the password
            }
        }
    </script>

</body>

</html>
