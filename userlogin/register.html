<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AgriMarket</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="login-container">
        <!-- Left Section with Background Image -->
        <div class="image-section">
            <img src="../images/agrimarket_logo.png" alt="Agri Market Logo" class="logo">
            <div class="info">
                <p style="font-style: italic;">"AgriMarket: Bridging Farmers and Communities with Fresh, Local Goodness!"</p>
            </div>
        </div>

        <div id="success-popup" class="popup">
            <div class="popup-content">
                <img src="../images/success-icon.png" alt="Success Icon" class="success-icon">
                <h2>You Rock!</h2>
                <p>Your information is received.</p>
                <button onclick="redirectToLogin()">Welcome!</button>
            </div>
        </div>


        <!-- Right Section with Register Form -->
        <div class="form-section">
            <h2>Register</h2>
            <form action="../php/register.php" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>

                <label for="phone_number">Phone Number:</label>
                <input type="text" id="phone_number" name="phone_number" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="password">Password:</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required><br><br>
                    <label>
                        <input type="checkbox" id="show-password" onclick="togglePassword()"> Show Password
                    </label>
                </div><br><br>

                <button type="submit" name="submit">Register</button>
            </form>

            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        // Show popup if "success" parameter is in the URL
        if (window.location.search.includes('success=1')) {
            showSuccessPopup();
        }

        function showSuccessPopup() {
             const popup = document.getElementById('success-popup');
             popup.style.display = 'flex';
        }

        function redirectToLogin() {
            window.location.href = "../userlogin/login.html";
        }

        function togglePassword() {
            var passwordField = document.getElementById("password");
            var checkbox = document.getElementById("show-password");
            if (checkbox.checked) {
                passwordField.type = "text";  // Show the password
            } else {
                passwordField.type = "password";  // Hide the password
            }
        }

    </script>

</body>
</html>
